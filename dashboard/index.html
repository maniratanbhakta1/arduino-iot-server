<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Temperature Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">
    <h1>IoT Temperature Monitor</h1>

    <div class="card">
      <p>Current Temperature</p>
      <h2 id="temperature">-- &deg;C</h2>
    </div>

    <div class="card">
      <p>Current Humidity</p>
      <h2 id="humidity">-- %</h2>
    </div>

    <div class="card">
      <p>Device</p>
      <h2 id="device">Waiting...</h2>
    </div>

    <div class="card">
      <p>Status</p>
      <h2 id="status" class="waiting">Waiting...</h2>
    </div>

    <p id="time">Last Updated: --</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
